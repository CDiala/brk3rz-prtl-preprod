<div class="md:p-4 max-w-5xl mx-auto space-y-6">
  <!-- Search widget -->
  <div class="">
    <h1 class="text-xl font-bold my-2">Customer Creation</h1>

    <hr class="mb-4" />

    <!-- Form card -->
    <mat-card>
      <mat-card-content>
        <form [formGroup]="kycForm" (ngSubmit)="onSubmit()" class="space-y-4">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <mat-form-field class="w-full">
              <mat-label>Client type</mat-label>
              <mat-select formControlName="clientType" name="clientType">
                <mat-option value=""></mat-option>
                @for (bank of ['Individual','Corporate']; track bank) {
                <mat-option [value]="bank[0]">{{ bank }}</mat-option>
                }
              </mat-select>
            </mat-form-field>
          </div>

          @if (kycForm.get('clientType')?.value === 'I') {
          <lib-individual></lib-individual>
          } @else if (kycForm.get('clientType')?.value === 'C') {
          <lib-corporate></lib-corporate>
          }
        </form>
      </mat-card-content>
    </mat-card>
  </div>
</div>
