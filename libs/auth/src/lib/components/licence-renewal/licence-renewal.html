<div class="flex flex-col">
  <!-- Login Card Container -->
  <div
    class="flex flex-1 flex-col md:flex-row gap-2 md:gap-8 items-center md:justify-center z-20"
  >
    <mat-card class="w-full max-w-md rounded-lg shadow-lg p-6 md:p-8 lg:p-10">
      <!-- Header -->
      <div class="md:mb-8">
        <!-- Go back button -->
        <p class="text-left my-2">
          <a
            [routerLink]="['/auth/login']"
            class="text-red-600 text-xl font-medium hover:text-red-700 transition cursor-pointer"
          >
            &larr; Go back
          </a>
        </p>
        <h2 class="text-3xl font-bold text-gray-900 mb-2">Licence Renewal</h2>
        <p class="text-gray-600">Please enter your details to continue.</p>
      </div>

      <!-- Login Form -->
      <form
        [formGroup]="licenceForm"
        (ngSubmit)="onSubmit()"
        class="md:space-y-6"
      >
        <!-- Email Field -->
        <div>
          <mat-form-field class="w-full">
            <mat-label>Company Name</mat-label>
            <input
              readonly
              matInput
              type="text"
              formControlName="companyName"
              placeholder="Company Name"
            />
          </mat-form-field>
        </div>

        <div class="supportDoc">
          <span class="input-group-text">Supporting Documents</span>
          <lib-attach-upload
            [multiple]="true"
            [formControl]="uploadedFile"
            #fileUploadComponent
          ></lib-attach-upload>
        </div>

        <!-- Sign In Button -->
        <lib-button
          variant="primary"
          size="md"
          type="submit"
          [disabled]="isSubmitDisabled || isLoading()"
          class="w-full text-center mt-4 mb-2 md:my-0"
        >
          {{ isLoading() ? 'Processing...' : 'Submit' }}
        </lib-button>
      </form>

      <!-- Signup Link -->
      <!-- <div
        class="mt-4 md:mt-6 text-center text-sm border-t border-gray-200 pt-4 md:pt-6"
      >
        <p class="text-gray-600">
          First-time user?
          <a
            [routerLink]="['../register']"
            class="text-red-600 font-medium hover:text-red-700 transition cursor-pointer"
          >
            Register here
          </a>
        </p>
      </div> -->
    </mat-card>
  </div>
</div>
<ng-template #errorTemplate>
  <h2 class="flex justify-center font-semibold text-[16px] mb-5">⚠️ Notice</h2>
  <p>{{ loginError }}</p>
  <div class="vendorNameGrp"></div>
</ng-template>
