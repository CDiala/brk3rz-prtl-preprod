<div
  class="min-h-screen bg-linear-to-br from-gray-50 to-gray-100 flex flex-col"
>
  <!-- Login Card Container -->
  <div
    class="flex flex-1 flex-col md:flex-row gap-2 md:gap-8 items-center justify-center  z-20"
  >
    <!-- Logo Section -->
    <div class="px-4 text-center">
      <div class="flex justify-center mb-2">
        <img src="logo_style.png" alt="InsurFlow Logo" class="h-10 md:h-12" />
      </div>
      <h1 class="text-2xl md:text-5xl lg:text-7xl font-bold text-red-600">
        InsurFlow
      </h1>
    </div>

    <div class="block w-[95vw] md:w-[40vw]">
      <router-outlet></router-outlet>
    </div>
  </div>

  <!-- Red design -->
  <img
    class="absolute bottom-0"
    ngSrc="red.webp"
    [width]="2560"
    [height]="374"
    ngSrcset="400w, 800w, 1400w"
    sizes="(max-width: 768px) 100vw, 50vw"
    alt="Responsive red image"
  />
</div>
