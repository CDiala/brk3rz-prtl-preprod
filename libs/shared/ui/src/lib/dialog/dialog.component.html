<h2 mat-dialog-title>{{title}}</h2>
<mat-dialog-content class="mat-typography">

  @if (isTemplateRef) {
    <ng-container [ngTemplateOutlet]="data.content"></ng-container>
  } @else {
    <ng-container *ngComponentOutlet="data.content"></ng-container>
  }


</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>{{cancelButton}}</button>
  @if (buttonText) {
    <button (click)="buttonAction()" mat-button cdkFocusInitial>{{ buttonText }}</button>
  }

</mat-dialog-actions>
