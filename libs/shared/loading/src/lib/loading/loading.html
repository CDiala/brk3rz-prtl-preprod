@if (isLoading) {
<div
  class="loading-overlay fixed top-0 left-0 w-full h-full bg-[#00000080] flex flex-col gap-2 items-center justify-center z-9999"
>
  <mat-spinner class="w-10! h-10!"></mat-spinner>
  <span class="italic text-gray-200"
    >Please wait, this might take a while . . .</span
  >
</div>
}
